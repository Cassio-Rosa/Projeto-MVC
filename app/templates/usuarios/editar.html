<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuário — Estoque</title>
</head>
<body>
    <h1>Editar Usuário</h1>
    
    <p>Editando o usuário: <strong>{{ usuario.nome }}</strong> (ID: {{ usuario.id }})</p>

    <form action="/usuarios/{{ usuario.id }}/editar" method="post">
        
        <p>
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" value="{{ usuario.nome }}" required>
        </p>

        <p>
            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" value="{{ usuario.email }}" required>
        </p>

        <p>
            <label for="senha">Nova Senha (deixe em branco para manter a atual):</label><br>
            <input type="password" id="senha" name="senha" placeholder="Sua nova senha...">
        </p>

        <p>
            <label for="role">Perfil:</label><br>
            <select id="role" name="role" required>
                <option value="admin" {% if usuario.role == 'admin' %}selected{% endif %}>admin</option>
                <option value="usuario" {% if usuario.role == 'operador' %}selected{% endif %}>operador</option>
            </select>
        </p>

        <p>
            <label>
                <input type="checkbox" name="ativo" value="on" {% if usuario.ativo %}checked{% endif %}>
                Usuário Ativo
            </label>
        </p>

        <br>
        <button type="submit">Salvar Alterações</button>
        <a href="/usuarios" style="margin-left: 10px;">Cancelar</a>
    </form>

    <hr>
    <p><a href="/usuarios">← Voltar para a lista</a></p>
</body>
</html>
